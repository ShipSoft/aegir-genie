[workspace]
name = "aegir-genie"
description = "GENIE neutrino event generation plugin for the aegir simulation framework"
channels = [
  # Local channel with the not-yet-published genie package.
  # TODO: drop once genie is published to prefix.dev/ship.
  "file:///home/olantwin/Projects/SHiP/ship-conda-recipes-genie/output",
  "https://prefix.dev/ship",
  "conda-forge",
]
platforms = ["linux-64"]
requires-pixi = ">=0.68"

[dependencies]
# SHiP/HEP packages (prefix.dev/ship + conda-forge)
shipdatamodel = "*"
phlex = ">=0.3.0"
root = ">=6.40"
# phlex/shipdatamodel are C++23 — pull the matching ROOT build variant.
root_cxx_standard = "==23"
# The GENIE event generator, pythia6-hadronization variant (the production
# backend; a pythia8 variant exists for comparison studies). Built against
# C++23 ROOT, so it coexists with phlex in this environment. Its link-time
# dependencies (libxml2, lhapdf, gsl, pythia6, rootegpythia6 — GENIE's
# shared libraries do not record their own dependencies) arrive as run
# dependencies.
genie = { version = ">=3.6.2", build = "pythia6_*" }
random123 = "*"
libjsonnet = "*"

# C++ libraries (phlex's cmake config lacks find_dependency for these)
libboost-devel = "*"
tbb-devel = "*"
spdlog = "*"
# GENIE's public headers include log4cpp; declared explicitly (it also
# arrives as a genie run dependency).
log4cpp = "*"
# conda-forge log4cpp 1.1.4 underdeclares its libnsl runtime dependency.
libnsl = "*"

# Build tools
cmake = ">=3.27"
ninja = "*"
cxx-compiler = "*"

[environments]
default = { solve-group = "default" }

[activation]
scripts = ["activate.sh"]

[tasks]
configure = { cmd = """
cmake -S . -B build -G Ninja \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
""" }
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
install = { cmd = "cmake --install build", depends-on = ["build"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }
clean = "rm -rf build"
