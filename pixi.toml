[workspace]
name = "aegir-genie"
description = "GENIE neutrino event generation plugin for the aegir simulation framework"
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]
requires-pixi = ">=0.68"

[dependencies]
# SHiP/HEP packages (prefix.dev/ship + conda-forge)
shipdatamodel = "*"
phlex = ">=0.3.0"
root = ">=6.40"
# phlex/shipdatamodel are C++23 — pull the matching ROOT build variant.
root_cxx_standard = "==23"
# The GENIE event generator, pythia6-hadronization variant (the production
# backend; a pythia8 variant exists for comparison studies). Built against
# C++23 ROOT, so it coexists with phlex in this environment. Its link-time
# dependencies (libxml2, lhapdf, gsl, pythia6, rootegpythia6 — GENIE's
# shared libraries do not record their own dependencies) arrive as run
# dependencies.
genie = { version = ">=3.6.2", build = "pythia6_*" }
random123 = "*"
libjsonnet = "*"
# Geometry service (GeoModel-backed); the geometry analyzer navigates the
# converted Geant4 geometry, so Geant4 is a direct dependency too.
shipgeometryservice = "*"
geant4 = ">=11.3"

# C++ libraries (phlex's cmake config lacks find_dependency for these)
libboost-devel = "*"
tbb-devel = "*"
spdlog = "*"
# GENIE's public headers include log4cpp; declared explicitly (it also
# arrives as a genie run dependency).
log4cpp = "*"
# conda-forge log4cpp 1.1.4 underdeclares its libnsl runtime dependency.
libnsl = "*"

# Build tools
cmake = ">=3.27"
ninja = "*"
cxx-compiler = "*"
genie-splines-ship = ">=3.6.2,<4"

# Developing against unreleased sibling checkouts (same pattern as aegir):
# uncomment locally, never commit uncommented.
#
# [feature.dev]
# channels = [{ channel = "../ship-local-channel", priority = 10 }]
#
# [feature.dev.dependencies]
# shipgeometryservice = { path = "../geometry_service" }

[environments]
default = { solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }

[activation]
scripts = ["activate.sh"]

[tasks]
configure = { cmd = """
cmake -S . -B build -G Ninja \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
    -DCMAKE_INSTALL_LIBDIR=lib \
    -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
""" }
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
install = { cmd = "cmake --install build", depends-on = ["build"] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = ["build"] }
clean = "rm -rf build"

# Linting / formatting toolchain. prek orchestrates the hooks; the tools come
# from this environment so versions are tracked in pixi.lock and run identically
# everywhere (including NixOS). See .pre-commit-config.yaml.
[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
ruff = "*"
clang-format = "22.*"
codespell = "*"
reuse = "*"
cffconvert = "*"
commitizen = "*"

# Pinned via PyPI to match the previous hook revs exactly: conda-forge's cpplint
# is stuck at 1.6.0 (a different, stale fork), and its gersemi lags the version
# used by the other SHiP repos (0.27.7) and would reflow CMake files.
[feature.lint.pypi-dependencies]
cpplint = "==2.0.2"
gersemi = "==0.27.7"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/pre-commit"
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/commit-msg"
'''
